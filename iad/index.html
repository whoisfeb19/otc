<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Affairs - Report System</title>
    <style>
        :root { --discord-blue: #5865f2; --bg: #313338; --card: #2b2d31; --input: #1e1f22; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { background: var(--card); padding: 30px; border-radius: 8px; width: 100%; max-width: 500px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .hidden { display: none; }
        h2 { text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #b5bac1; margin-bottom: 25px; font-size: 14px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #b5bac1; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 10px; background: var(--input); border: none; border-radius: 4px; color: white; font-size: 15px; outline: none; }
        input:focus { border: 1px solid var(--discord-blue); }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 16px; }
        .btn-discord { background: var(--discord-blue); color: white; text-decoration: none; display: block; text-align: center; }
        .btn-submit { background: #248046; color: white; margin-top: 15px; }
        .btn-submit:hover { background: #1a6334; }
        .checkbox-container { display: flex; gap: 10px; font-size: 13px; color: #dbdee1; line-height: 1.4; margin-top: 20px; }
        input[type="checkbox"] { width: auto; }
    </style>
</head>
<body>

<div class="container">
    <h2>Internal Affairs Division</h2>
    <p class="subtitle">Layanan Pengaduan Internal Kepolisian</p>

    <!-- STEP 1: LOGIN SECTION -->
    <div id="loginSection">
        <button id="loginBtn" class="btn btn-discord">Login with Discord</button>
    </div>

    <!-- STEP 2: FORM SECTION (Hidden by default) -->
    <div id="formSection" class="hidden">
        <form id="reportForm">
            <div class="form-group">
                <label>Username Discord</label>
                <input type="text" id="discord_user" readonly style="opacity: 0.6; cursor: not-allowed;">
            </div>

            <div class="form-group">
                <label>User Control Panel (UCP)</label>
                <input type="text" id="ucp" required placeholder="Contoh: Budi_Santoso">
            </div>

            <div class="form-group">
                <label>Nama Pelapor (IC)</label>
                <input type="text" id="nama_pelapor" required>
            </div>

            <div class="form-group">
                <label>Nama Terlapor (Petugas)</label>
                <input type="text" id="nama_terlapor" required>
            </div>

            <div class="form-group">
                <label>Dugaan Pelanggaran</label>
                <select id="pasal" required>
                    <option value="">-- Pilih Jenis Pelanggaran --</option>
                    <option value="Penyalahgunaan Senjata Api">Penyalahgunaan Senjata Api</option>
                    <option value="Tindakan Tidak Profesional (Powergaming/Metagaming)">Tindakan Tidak Profesional</option>
                    <option value="Korupsi atau Suap">Korupsi atau Suap</option>
                    <option value="Kekerasan Tanpa Alasan (DM)">Kekerasan Tanpa Alasan</option>
                </select>
            </div>

            <div class="form-group">
                <label>Kronologi</label>
                <textarea id="kronologi" rows="4" required placeholder="Jelaskan kejadian secara detail..."></textarea>
            </div>

            <div class="form-group">
                <label>Link Bukti (Foto/Video)</label>
                <input type="url" id="bukti" required placeholder="https://imgur.com atau ://youtube.com...">
            </div>

            <div class="checkbox-container">
                <input type="checkbox" id="setuju" required>
                <label for="setuju" style="text-transform: none;">Laporan ini bersifat resmi. Saya bersedia mempertanggungjawabkan data ini di hadapan Internal Affairs Division.</label>
            </div>

            <button type="submit" class="btn btn-submit">KIRIM LAPORAN SEKARANG</button>
        </form>
    </div>
</div>

<script>
// --- KONFIGURASI ---
const clientId = '1383312431253815378'; // ID kamu
const redirectUri = window.location.origin + window.location.pathname;
const webhookURL = "MASUKKAN_URL_WEBHOOK_DISCORD_DI_SINI"; 

// --- LOGIKA LOGIN ---
document.getElementById('loginBtn').onclick = function(){
  const url = `https://discord.com/api/oauth2/authorize?client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=identify`;
  window.location.href = url;
}

window.onload = async function(){
  // Tangkap token dari URL
  if (window.location.hash && window.location.hash.includes('access_token')){
    const params = new URLSearchParams(window.location.hash.substring(1));
    const token = params.get('access_token');
    if(token){
        localStorage.setItem('discord_token', token);
        history.replaceState(null, '', window.location.pathname);
    }
  }

  const token = localStorage.getItem('discord_token');
  if(token){
    try {
        const r = await fetch('https://discord.com/api/users/@me', {
            headers: { Authorization: 'Bearer ' + token }
        });
        
        if(r.ok){
            const user = await r.json();
            // User berhasil login, tampilkan form & isi username otomatis
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('formSection').classList.remove('hidden');
            document.getElementById('discord_user').value = `${user.username} (ID: ${user.id})`;
        } else {
            localStorage.removeItem('discord_token');
        }
    } catch(e) {
        console.error("Gagal ambil data Discord", e);
    }
  }
}

// --- KIRIM DATA KE WEBHOOK ---
document.getElementById('reportForm').onsubmit = async function(e){
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.disabled = true;
    btn.innerText = "Mengirim...";

    const payload = {
        username: "IA Division Logs",
        avatar_url: "https://i.imgur.com",
        embeds: [{
            title: "📩 LAPORAN BARU MASUK",
            color: 15548997, // Warna Merah
            fields: [
                { name: "👤 Pengguna Discord", value: document.getElementById('discord_user').value },
                { name: "🆔 UCP Account", value: document.getElementById('ucp').value, inline: true },
                { name: "📝 Nama Pelapor (IC)", value: document.getElementById('nama_pelapor').value, inline: true },
                { name: "👮 Nama Terlapor", value: document.getElementById('nama_terlapor').value },
                { name: "⚖️ Jenis Pelanggaran", value: document.getElementById('pasal').value },
                { name: "📖 Kronologi", value: document.getElementById('kronologi').value },
                { name: "🔗 Link Bukti", value: document.getElementById('bukti').value }
            ],
            footer: { text: "Internal Affairs Division - Automated Report" },
            timestamp: new Date()
        }]
    };

    try {
        await fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        alert("Laporan berhasil terkirim ke Internal Affairs!");
        location.reload();
    } catch(err) {
        alert("Gagal mengirim laporan. Cek koneksi atau Webhook URL.");
        btn.disabled = false;
        btn.innerText = "KIRIM LAPORAN SEKARANG";
    }
}
</script>
</body>
</html>
