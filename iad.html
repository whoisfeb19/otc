<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Kece</title>
    <style>
        body {
            background-color: #23272a; /* Warna khas Discord dark */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            background-color: #2c2f33;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
            width: 300px;
        }

        h2 { color: white; margin-bottom: 20px; }

        .btn-discord {
            background-color: #5865F2;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 5px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            transition: 0.3s;
        }

        .btn-discord:hover {
            background-color: #4752c4;
            transform: translateY(-2px);
        }

        p { color: #b9bbbe; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Selamat Datang!</h2>
        <!-- GANTI LINK DI BAWAH INI -->
        <a href="https://ottibonynyo-mods.netlify.app/iad.html" class="btn-discord">
            Login dengan Discord
        </a>
        <p>Aman & Cepat</p>
    </div>

</body>
</html>
