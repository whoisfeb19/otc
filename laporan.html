<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Laporan Internal Affairs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1c21; color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-discord { background-color: #5865F2; transition: 0.3s; }
        .btn-discord:hover { background-color: #4752C4; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- LOGIN SECTION -->
    <div id="login-section" class="max-w-md w-full glass-card p-8 rounded-2xl text-center shadow-2xl">
        <img src="https://cdn-icons-png.flaticon.com" class="w-20 mx-auto mb-6" alt="Discord Logo">
        <h1 class="text-2xl font-bold mb-2 text-blue-400">Internal Affairs Division</h1>
        <p class="text-gray-400 mb-8 leading-relaxed">Silakan masuk dengan akun Discord Anda untuk melanjutkan pelaporan petugas.</p>
        <button onclick="loginDiscord()" class="btn-discord w-full py-3 px-6 rounded-lg font-semibold flex items-center justify-center gap-2">
            Login with Discord
        </button>
    </div>

    <!-- FORM SECTION (Hidden by default) -->
    <div id="form-section" class="max-w-2xl w-full glass-card p-8 rounded-2xl shadow-2xl hidden">
        <div class="flex justify-between items-center mb-6 border-b border-gray-700 pb-4">
            <h2 class="text-xl font-bold text-blue-400">Form Laporan Petugas</h2>
            <div id="user-badge" class="bg-gray-800 px-3 py-1 rounded-full text-sm flex items-center gap-2">
                <span id="user-display">Loading...</span>
            </div>
        </div>

        <form id="report-form" class="space-y-4">
            <!-- Username Discord (Locked) -->
            <div>
                <label class="block text-sm font-medium mb-1">Username Discord (Otomatis)</label>
                <input type="text" id="discord_user" readonly class="w-full bg-gray-900 border border-gray-700 rounded p-3 text-gray-500 cursor-not-allowed">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">User Control Panel (UCP)</label>
                    <input type="text" id="ucp" required placeholder="Contoh: Badrol_Ganteng" class="w-full bg-gray-800 border border-gray-700 rounded p-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Nama Pelapor (IC)</label>
                    <input type="text" id="nama_pelapor" required class="w-full bg-gray-800 border border-gray-700 rounded p-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Nama Terlapor (Petugas)</label>
                <input type="text" id="nama_terlapor" required class="w-full bg-gray-800 border border-gray-700 rounded p-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Dugaan Pelanggaran</label>
                <select id="pasal" required class="w-full bg-gray-800 border border-gray-700 rounded p-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">-- Pilih Pasal Pelanggaran --</option>
                    <option value="Pasal 1: Penyalahgunaan Wewenang">Pasal 1: Penyalahgunaan Wewenang</option>
                    <option value="Pasal 2: Kekerasan Berlebih">Pasal 2: Kekerasan Berlebih</option>
                    <option value="Pasal 3: Korupsi & Suap">Pasal 3: Korupsi & Suap</option>
                    <option value="Pasal 4: Ketidakprofesionalan">Pasal 4: Ketidakprofesionalan</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Kronologi Kejadian</label>
                <textarea id="kronologi" rows="4" required class="w-full bg-gray-800 border border-gray-700 rounded p-3 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Jelaskan secara detail..."></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Bukti (Link Foto/Video)</label>
                <input type="url" id="bukti" required placeholder="https://imgur.com..." class="w-full bg-gray-800 border border-gray-700 rounded p-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="flex items-start gap-3 bg-red-900/20 p-4 rounded-lg border border-red-900/50">
                <input type="checkbox" id="tos" required class="mt-1 w-4 h-4">
                <label for="tos" class="text-xs text-gray-300">
                    Laporan ini bersifat RESMI dan akan dipantau oleh Internal Affairs Division. Pelapor wajib mempertanggungjawabkan dan membuktikan laporan tersebut jika diminta keterangan lebih lanjut.
                </label>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-lg font-bold uppercase tracking-wider transition duration-200">
                Kirim Laporan
            </button>
        </form>
    </div>

    <script>
        // --- CONFIGURATION (GANTI DISINI) ---
        const CLIENT_ID = '1383312431253815378'; // Ganti dengan Client ID dari Discord Developer Portal
        const REDIRECT_URI = window.location.href.split('#')[0]; // URL file ini otomatis
        const WEBHOOK_URL = 'https://discord.com'; // Ganti dengan Webhook Channel Anda

        // 1. Alur Login Discord
        function loginDiscord() {
            const scope = 'identify';
            const authUrl = `https://discord.com{CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=${scope}`;
            window.location.href = authUrl;
        }

        // 2. Cek Token di URL setelah Login
        window.onload = () => {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const accessToken = fragment.get('access_token');

            if (accessToken) {
                fetchDiscordUser(accessToken);
            }
        };

        // 3. Ambil data User dari API Discord
        async function fetchDiscordUser(token) {
            try {
                const response = await fetch('https://discord.com', {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const user = await response.json();
                
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('form-section').classList.remove('hidden');
                
                document.getElementById('discord_user').value = `${user.username}#${user.discriminator || '0'}`;
                document.getElementById('user-display').innerText = user.username;
            } catch (err) {
                alert('Gagal mengambil data Discord!');
            }
        }

        // 4. Kirim Data ke Webhook Discord
        document.getElementById('report-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "Mengirim...";
            btn.disabled = true;

            const data = {
                username: "Internal Affairs Logs",
                embeds: [{
                    title: "🚨 LAPORAN PELANGGARAN PETUGAS",
                    color: 15158332, // Merah
                    fields: [
                        { name: "Pelapor (Discord)", value: document.getElementById('discord_user').value, inline: true },
                        { name: "UCP", value: document.getElementById('ucp').value, inline: true },
                        { name: "Nama Pelapor (IC)", value: document.getElementById('nama_pelapor').value, inline: true },
                        { name: "Nama Terlapor", value: document.getElementById('nama_terlapor').value, inline: true },
                        { name: "Dugaan Pelanggaran", value: document.getElementById('pasal').value },
                        { name: "Kronologi", value: document.getElementById('kronologi').value },
                        { name: "Bukti", value: document.getElementById('bukti').value },
                    ],
                    footer: { text: "Sistem Laporan IAD • " + new Date().toLocaleString() }
                }]
            };

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                alert('Laporan berhasil terkirim ke Internal Affairs!');
                location.reload();
            } catch (err) {
                alert('Gagal mengirim laporan!');
                btn.disabled = false;
                btn.innerText = "Kirim Laporan";
            }
        };
    </script>
</body>
</html>
