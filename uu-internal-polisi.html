<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UU Kepolisian</title>
    <style>
        /* Reset & Dasar */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; color: #333; }

        /* Sidebar Profesional */
        .sidebar { 
            width: 300px; background: #1a202c; color: white; 
            height: 100vh; position: fixed; overflow-y: auto; padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
        }
        .sidebar h2 { font-size: 1.2rem; margin-bottom: 20px; color: #63b3ed; border-bottom: 1px solid #2d3748; padding-bottom: 10px; }
        .sidebar a { 
            display: block; color: #a0aec0; text-decoration: none; 
            padding: 10px; font-size: 0.9rem; border-radius: 5px; transition: 0.3s;
        }
        .sidebar a:hover { background: #2d3748; color: white; padding-left: 15px; }

        /* Konten Utama */
        .main { margin-left: 300px; padding: 40px; width: 100%; min-height: 100vh; }
        .document { 
            max-width: 900px; margin: auto; background: white; 
            padding: 50px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }

        /* Header Dokumen */
        header { text-align: center; border-bottom: 3px double #2c3e50; margin-bottom: 40px; padding-bottom: 20px; }
        header h1 { font-size: 1.5rem; color: #2d3748; text-transform: uppercase; }
        header h2 { font-size: 1.1rem; color: #4a5568; margin-top: 10px; }

        /* Styling BAB & Pasal */
        .bab-title { 
            background: #2c3e50; color: white; padding: 12px 20px; 
            margin-top: 40px; border-radius: 4px; font-size: 1.2rem; 
        }
        .pasal { margin: 25px 0; padding: 20px; border-left: 5px solid #3182ce; background: #f7fafc; }
        .pasal-label { font-weight: bold; color: #2b6cb0; font-size: 1.1rem; display: block; margin-bottom: 15px; }
        
        .ayat { display: flex; gap: 10px; margin-bottom: 10px; line-height: 1.6; }
        .ayat-n { font-weight: bold; min-width: 20px; }

        /* Box Sanksi */
        .penalty-box { 
            background: #fff5f5; border: 1px solid #feb2b2; 
            padding: 15px; margin-top: 15px; border-radius: 6px; 
            font-size: 0.95rem; border-left: 5px solid #f56565;
        }
        .denda-text { font-weight: bold; color: #c53030; display: block; margin-bottom: 5px; text-transform: uppercase; }
        
        /* Link dalam teks */
        .ayat a { color: #3182ce; text-decoration: none; font-weight: bold; }
        .ayat a:hover { text-decoration: underline; }

        /* Scrollbar Sidebar */
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Sidebar akan diisi oleh window.menuHTML -->
    <nav class="sidebar" id="sidebar-nav"></nav>

    <main class="main">
        <article class="document">
            <header>
                <h1>UU NO. 50 TAHUN 2026 TENTANG KEPOLISIAN</h1>
                <h2>UNDANG-UNDANG INTERNAL KEPOLISIAN TAHUN 2026</h2>
            </header>

            <!-- Konten utama akan diisi oleh window.kodeHTML -->
            <div id="isi-hukum-otomatis"></div>
        </article>
    </main>

    <!-- Memanggil data eksternal -->
    <script src="uu-internal-polisi.js"></script>

    <!-- Logika untuk merender data -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const sidebarContainer = document.getElementById('sidebar-nav');
            const contentContainer = document.getElementById('isi-hukum-otomatis');

            // Cek apakah variabel dari uu.js tersedia
            if (typeof window.menuHTML !== 'undefined' && typeof window.kodeHTML !== 'undefined') {
                sidebarContainer.innerHTML = window.menuHTML;
                contentContainer.innerHTML = window.kodeHTML;
                console.log("Data UU Berhasil Dimuat");
            } else {
                contentContainer.innerHTML = `
                    <div style="color: red; padding: 20px; border: 1px dashed red;">
                        <strong>Error:</strong> Data dari uu.js tidak ditemukan.<br>
                        Pastikan file <b>uu.js</b> ada di folder yang sama dan variabel 
                        <i>window.menuHTML</i> serta <i>window.kodeHTML</i> sudah didefinisikan.
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
